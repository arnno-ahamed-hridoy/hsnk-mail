<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSNK Mail</title>
  <meta name="description" content="Free disposable temporary email. Reuse the same inbox anytime, no signup required.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0; min-height: 100vh;
      background: #0b1419;
      background-image: radial-gradient(circle at 20% 30%, rgba(40, 120, 180, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(30, 100, 160, 0.05) 0%, transparent 50%);
      color: #e2edf0;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center;
      padding: 16px;
    }

    #wrap {
      width: 100%; max-width: 680px; padding: 10px 8px 40px;
    }

    /* Premium glass card - navy blue theme */
    .glass-card {
      position: relative;
      background: rgba(14, 30, 42, 0.65);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid rgba(70, 150, 210, 0.12);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      padding: 30px 26px 26px;
      margin-bottom: 24px;
      transition: border-color 0.3s;
      overflow: hidden;
    }
    .glass-card:hover { border-color: rgba(70, 150, 210, 0.2); }
    .glass-card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #ff8a5c, #f5c542, #5bc0eb, #7a5cf5, #ff5c9e, #ff8a5c);
      background-size: 300% 100%;
      animation: shimmerBar 6s linear infinite;
    }
    @keyframes shimmerBar {
      0% { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .premium-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(245, 197, 66, 0.15), rgba(255, 138, 92, 0.1));
      border: 1px solid rgba(245, 197, 66, 0.35);
      color: #f5c542;
      font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
      padding: 4px 14px; border-radius: 30px;
      margin-top: 10px;
    }

    /* Brand */
    .brand {
      text-align: center; margin-bottom: 22px;
    }
    .brand-mark {
      font-size: 32px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      letter-spacing: -0.5px;
    }
    .brand-mark .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #5bc0eb;
      box-shadow: 0 0 28px #5bc0eb, 0 0 60px rgba(91, 192, 235, 0.15);
      animation: pulse-dot 2.8s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }
    .brand-mark .g {
      background: linear-gradient(135deg, #7ad0f5, #4ba8d9, #5bc0eb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    .brand-sub {
      font-size: 13px; color: #8aaec2; letter-spacing: 0.4px;
      background: rgba(30, 70, 100, 0.15);
      backdrop-filter: blur(6px);
      padding: 4px 20px; border-radius: 60px;
      display: inline-block;
      border: 1px solid rgba(70, 150, 210, 0.06);
      margin-top: 4px;
    }

    .section-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      color: #8aadc0; letter-spacing: 1.6px; margin-bottom: 14px;
      text-align: center;
    }

    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .row > * { flex: 1 1 auto; }

    input, select {
      background: rgba(8, 20, 30, 0.6);
      border: 1px solid rgba(60, 140, 200, 0.12);
      border-radius: 28px;
      padding: 14px 22px;
      font-size: 15px;
      color: #e8f2f5;
      outline: none;
      transition: 0.25s;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      font-weight: 450;
      width: 100%;
    }
    input:focus, select:focus {
      border-color: #5bc0eb;
      background: rgba(10, 26, 38, 0.7);
      box-shadow: 0 0 0 4px rgba(91, 192, 235, 0.05), inset 0 2px 10px rgba(0,0,0,0.4);
    }
    select { cursor: pointer; max-width: 190px; padding: 16px 22px; font-size: 15.5px; font-weight: 600; }

    .addr-main-row { flex-wrap: nowrap; }
    .addr-main-row input { flex: 1 1 auto; min-width: 0; }
    .addr-main-row select { flex: 0 0 auto; }
    .icon-copy-btn {
      flex: 1 1 auto;
      min-width: 90px;
      height: 54px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, #ff8a5c, #f5c542);
      border: none; border-radius: 18px;
      color: #1a1206;
      font-size: 14.5px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(245, 150, 60, 0.3);
      transition: 0.2s;
    }
    .icon-copy-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(245, 150, 60, 0.45); }
    .icon-copy-btn:active { transform: scale(0.98); }
    @media (max-width: 480px) {
      .addr-main-row { flex-wrap: wrap; }
      select { padding: 13px 16px; font-size: 14.5px; }
      .icon-copy-btn { height: 48px; font-size: 13.5px; }
    }

    .btn {
      background: linear-gradient(145deg, #1a4a66, #0e3348);
      border: 1px solid #2e7a9e;
      color: #d4edf5;
      padding: 14px 24px;
      border-radius: 60px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 24px rgba(0, 30, 50, 0.35);
      letter-spacing: 0.2px;
      display: inline-flex; align-items: center; gap: 8px;
      justify-content: center;
      white-space: nowrap;
      flex: 1;
    }
    .btn:hover {
      background: linear-gradient(145deg, #225a7a, #124058);
      border-color: #5bc0eb;
      transform: scale(1.01);
      box-shadow: 0 8px 32px rgba(0, 40, 70, 0.4);
    }
    .btn-outline {
      background: rgba(20, 50, 70, 0.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(60, 140, 200, 0.1);
      color: #b0d4e8;
      flex: 0 1 auto;
      padding: 14px 22px;
    }
    .btn-outline:hover {
      background: rgba(30, 70, 100, 0.3);
      border-color: #5bc0eb;
      color: #d4edf5;
    }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    .active-addr-row {
      display: none;
      align-items: center; justify-content: space-between;
      gap: 14px; margin-top: 18px;
      padding: 14px 22px;
      background: rgba(10, 28, 40, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(70, 150, 210, 0.08);
      border-radius: 50px;
    }
    .active-addr-text {
      font-size: 16px; color: #eaf2f5; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
    }
    .copy-btn {
      background: rgba(40, 100, 140, 0.15);
      border: 1px solid rgba(70, 150, 210, 0.08);
      color: #b0d4e8;
      padding: 6px 22px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 13px; font-weight: 500;
      transition: 0.15s;
      backdrop-filter: blur(4px);
    }
    .copy-btn:hover { background: rgba(50, 120, 170, 0.15); border-color: #5bc0eb; color: #d4edf5; }

    .live-badge {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(90, 220, 140, 0.1);
      border: 1px solid rgba(90, 220, 140, 0.35);
      color: #5ce0a0;
      font-size: 11.5px; font-weight: 700; letter-spacing: 0.5px;
      padding: 5px 14px; border-radius: 30px;
    }
    .live-badge .lb-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #5ce0a0;
      box-shadow: 0 0 8px #5ce0a0;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    /* Inbox */
    .inbox-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 16px 0 18px;
      padding: 0 4px;
    }
    .inbox-title-group {
      display: flex; align-items: baseline; gap: 14px;
    }
    .inbox-title {
      font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
    }
    .inbox-count {
      font-size: 13px; color: #8aadc0; font-weight: 500;
      background: rgba(30, 70, 100, 0.15); padding: 2px 16px; border-radius: 30px;
    }
    #refreshBtn {
      background: rgba(20, 50, 70, 0.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(60, 140, 200, 0.08);
      color: #b0d4e8;
      border-radius: 60px;
      padding: 8px 26px;
      cursor: pointer;
      font-size: 14px; font-weight: 500;
      transition: 0.15s;
    }
    #refreshBtn:hover { background: rgba(30, 70, 100, 0.2); border-color: #5bc0eb; }

    #errorBar, #infoBar {
      display: none; margin: 12px 0; padding: 14px 22px;
      border-radius: 40px; font-size: 14px;
      backdrop-filter: blur(8px);
      font-weight: 450;
    }
    #errorBar { background: rgba(50, 20, 20, 0.4); border: 1px solid #a04a4a; color: #f0c0c0; }
    #infoBar { background: rgba(20, 60, 80, 0.3); border: 1px solid #3a8aaa; color: #c0e0f0; }

    .empty-hint {
      text-align: center; color: #6f99b0; font-size: 15px;
      padding: 52px 16px; background: rgba(10, 26, 38, 0.1);
      border-radius: 40px; backdrop-filter: blur(4px);
      border: 1px dashed rgba(60, 140, 200, 0.05);
    }

    .msg-item {
      padding: 16px 24px; border-radius: 28px;
      border: 1px solid rgba(40, 110, 160, 0.06);
      margin-bottom: 12px; cursor: pointer;
      background: rgba(14, 32, 46, 0.15);
      backdrop-filter: blur(6px);
      transition: 0.2s;
    }
    .msg-item:hover {
      border-color: #5bc0eb;
      background: rgba(28, 70, 100, 0.1);
      transform: translateX(5px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    .msg-from {
      font-size: 13px; color: #5bc0eb; font-weight: 600;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
    }
    .msg-subject {
      font-size: 17px; font-weight: 600; margin-top: 4px; color: #e0edf0;
    }
    .msg-time {
      font-size: 12px; color: #6f99b0; margin-top: 6px;
    }

    /* Modal */
    #modalOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(18px);
      align-items: center; justify-content: center; padding: 24px; z-index: 70;
    }
    #modal {
      background: rgba(14, 32, 46, 0.92); backdrop-filter: blur(24px);
      border: 1px solid rgba(70, 150, 210, 0.08);
      border-radius: 40px; max-width: 580px; width: 100%;
      max-height: 80vh; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
    }
    #modalHeader {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 24px 28px; border-bottom: 1px solid rgba(50, 130, 180, 0.06);
      gap: 12px;
    }
    #modalSubject { font-size: 19px; font-weight: 700; color: #eaf2f5; }
    #modalFrom {
      font-size: 14px; color: #8aadc0; margin-top: 4px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
    }
    #modalBody {
      padding: 28px; overflow-y: auto; font-size: 15px;
      color: #d0e4ec; line-height: 1.8;
    }
    .icon-btn {
      background: rgba(40, 100, 140, 0.08);
      border: none; color: #b0d4e8;
      font-size: 20px; width: 44px; height: 44px;
      border-radius: 60px; cursor: pointer;
      transition: 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(50, 120, 170, 0.1); color: #d4edf5; }

    footer {
      text-align: center; margin-top: 28px;
      font-size: 12px; color: #4f7a92; letter-spacing: 0.3px;
    }

    @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .spin { animation: spin 0.7s linear infinite; display: inline-block; }

    @media (max-width: 480px) {
      .glass-card { padding: 20px 14px; }
      .brand-mark { font-size: 28px; }
      .btn { font-size: 14px; padding: 12px 16px; }
      input, select { padding: 12px 16px; font-size: 14px; }
      .active-addr-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div id="wrap">
  <div class="brand">
    <div class="brand-mark"><span class="dot"></span>HSNK<span class="g">MAIL</span></div>
    <div class="brand-sub">temp mail · developer by ARNNO</div>
  </div>

  <!-- Address section -->
  <div class="glass-card">
    <div class="section-title">✦ your temporary address</div>
    <div class="row addr-main-row">
      <input id="nameInput" type="text" placeholder="yourname" autocomplete="off" spellcheck="false">
      <select id="domainSelect"></select>
      <button class="icon-copy-btn" id="copyBtn" title="Copy address">📋 Copy</button>
    </div>
    <div class="row" style="margin-top:14px;">
      <button class="btn" id="useBtn">✨ Get this address</button>
      <button class="btn btn-outline" id="randomBtn">⟳ New random name</button>
    </div>

    <div class="active-addr-row" id="activeAddrRow">
      <span class="active-addr-text" id="activeAddrText"></span>
      <span class="live-badge"><span class="lb-dot"></span>LIVE</span>
    </div>
  </div>

  <!-- Inbox -->
  <div class="inbox-header">
    <div class="inbox-title-group">
      <div class="inbox-title">📬 Inbox</div>
      <div class="inbox-count" id="inboxCount">0 messages</div>
    </div>
    <button id="refreshBtn">⟳ Refresh</button>
  </div>

  <div id="errorBar"></div>
  <div id="infoBar"></div>
  <div id="msgList"></div>

  <footer>One‑time mail from HSNK will save you from spam · free disposable service</footer>
</div>

<div id="modalOverlay">
  <div id="modal">
    <div id="modalHeader">
      <div>
        <div id="modalSubject"></div>
        <div id="modalFrom"></div>
      </div>
      <button class="icon-btn" id="closeModal">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ===== EMAIL LOGIC =====
const API_BASES = ["https://api.mail.tm", "https://api.mail.gw"];
const CREDS_KEY = "hsnkmail_creds";
const LAST_ADDR_KEY = "hsnkmail_last";
let pollTimer = null;
let currentToken = null;
let currentFull = null;
let currentApiBase = API_BASES[0];
let domainApiMap = {}; // domain -> api base it belongs to

function randToken(len) {
  const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
  let out = "";
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function showError(msg) {
  const bar = document.getElementById("errorBar");
  bar.textContent = "⚠ " + msg;
  bar.style.display = "block";
  document.getElementById("infoBar").style.display = "none";
  setTimeout(() => { bar.style.display = "none"; }, 7000);
}

function showInfo(msg) {
  const bar = document.getElementById("infoBar");
  bar.textContent = "✓ " + msg;
  bar.style.display = "block";
  setTimeout(() => { bar.style.display = "none"; }, 4000);
}

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (diff < 60) return diff + "s ago";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  return Math.floor(diff/86400) + "d ago";
}

function getCreds() { return JSON.parse(localStorage.getItem(CREDS_KEY) || "{}"); }
function saveCred(full, password, apiBase) {
  const creds = getCreds();
  creds[full] = { password, apiBase };
  localStorage.setItem(CREDS_KEY, JSON.stringify(creds));
}

function saveLastAddress(addr) {
  localStorage.setItem(LAST_ADDR_KEY, addr);
}
function getLastAddress() {
  return localStorage.getItem(LAST_ADDR_KEY) || "";
}

async function loadDomains() {
  const select = document.getElementById("domainSelect");
  const allDomains = [];
  const seen = new Set();
  for (const base of API_BASES) {
    try {
      for (let page = 1; page <= 2; page++) {
        const r = await fetch(`${base}/domains?page=${page}`);
        if (!r.ok) break;
        const d = await r.json();
        const member = d["hydra:member"] || d.member || [];
        if (!member.length) break;
        member.forEach(item => {
          if (item.domain && !seen.has(item.domain) && item.isActive !== false) {
            seen.add(item.domain);
            allDomains.push(item.domain);
            domainApiMap[item.domain] = base;
          }
        });
      }
    } catch (e) {
      // this provider is unreachable, skip it and keep whatever the other provider gave us
    }
  }
  if (!allDomains.length) {
    showError("Could not load domain list. Check your connection and reload the page.");
    return;
  }
  select.innerHTML = "";
  allDomains.forEach(domain => {
    const opt = document.createElement("option");
    opt.value = domain;
    opt.textContent = "@" + domain;
    select.appendChild(opt);
  });
}

function setDomainValue(domain) {
  const select = document.getElementById("domainSelect");
  const opt = [...select.options].find(o => o.value === domain);
  if (opt) select.value = domain;
}

function currentAddress() {
  const name = document.getElementById("nameInput").value.trim().toLowerCase().replace(/[^a-z0-9._-]/g, "");
  const domain = document.getElementById("domainSelect").value;
  if (!name || !domain) return null;
  return { name, domain, full: name + "@" + domain };
}

async function loginAccount(apiBase, address, password) {
  const r = await fetch(`${apiBase}/token`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address, password }),
  });
  if (!r.ok) throw new Error("login_failed");
  const d = await r.json();
  return d.token;
}

async function activateAddress() {
  const addr = currentAddress();
  if (!addr) { showError("Please type a name first."); return; }

  const apiBase = domainApiMap[addr.domain] || API_BASES[0];

  const btn = document.getElementById("useBtn");
  btn.disabled = true;
  btn.textContent = "Connecting...";
  document.getElementById("errorBar").style.display = "none";

  try {
    const creds = getCreds();
    const saved = creds[addr.full];
    let password = saved ? saved.password : null;
    let effectiveBase = saved ? (saved.apiBase || apiBase) : apiBase;
    let token;

    if (password) {
      try {
        token = await loginAccount(effectiveBase, addr.full, password);
        showInfo("Reconnected to your existing inbox.");
      } catch (e) {
        throw new Error("This address was created before on this browser, but login failed. Try again or pick a different name.");
      }
    } else {
      password = randToken(16);
      const createRes = await fetch(`${effectiveBase}/accounts`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address: addr.full, password }),
      });
      if (createRes.status === 422) {
        throw new Error("This name is already taken by someone else. Try another name or hit Random.");
      }
      if (!createRes.ok) {
        const errBody = await createRes.json().catch(() => ({}));
        throw new Error(errBody["hydra:description"] || "Could not create this address. Try another name.");
      }
      token = await loginAccount(effectiveBase, addr.full, password);
      saveCred(addr.full, password, effectiveBase);
      showInfo("Address created. It will reload automatically next time on this browser.");
    }

    currentToken = token;
    currentFull = addr.full;
    currentApiBase = effectiveBase;
    saveLastAddress(addr.full);

    document.getElementById("activeAddrRow").style.display = "flex";
    document.getElementById("activeAddrText").textContent = addr.full;

    fetchInbox(false);
    clearInterval(pollTimer);
    pollTimer = setInterval(() => fetchInbox(true), 12000);
  } catch (e) {
    showError(e.message || "Something went wrong. Please try again.");
  } finally {
    btn.disabled = false;
    btn.textContent = "✨ Get this address";
  }
}

async function fetchInbox(silent) {
  if (!currentToken || !currentFull) return;
  try {
    let r = await fetch(`${currentApiBase}/messages`, { headers: { Authorization: "Bearer " + currentToken } });
    if (r.status === 401) {
      const creds = getCreds();
      const saved = creds[currentFull];
      if (!saved) throw new Error("Session expired.");
      currentToken = await loginAccount(currentApiBase, currentFull, saved.password);
      r = await fetch(`${currentApiBase}/messages`, { headers: { Authorization: "Bearer " + currentToken } });
    }
    if (!r.ok) throw new Error("Could not load inbox.");
    const d = await r.json();
    const list = d["hydra:member"] || d.member || [];
    renderInbox(list);
  } catch (e) {
    if (!silent) showError(e.message || "Could not load inbox.");
  }
}

function renderInbox(list) {
  document.getElementById("inboxCount").textContent = list.length + (list.length === 1 ? " message" : " messages");
  const box = document.getElementById("msgList");
  if (!list.length) {
    box.innerHTML = `<div class="empty-hint">📭 Waiting for mails...<br><span style="opacity:.5;font-size:13px;">auto‑checks every 12s</span></div>`;
    return;
  }
  box.innerHTML = "";
  list.forEach(m => {
    const item = document.createElement("div");
    item.className = "msg-item";
    item.innerHTML = `
      <div class="msg-from">${(m.from && m.from.address) || "unknown"}</div>
      <div class="msg-subject">${m.subject || "(No subject)"}</div>
      <div class="msg-time">${timeAgo(m.createdAt)}</div>`;
    item.addEventListener("click", () => openMessage(m.id));
    box.appendChild(item);
  });
}

async function openMessage(id) {
  if (!currentToken) return;
  try {
    let r = await fetch(`${currentApiBase}/messages/${id}`, { headers: { Authorization: "Bearer " + currentToken } });
    if (!r.ok) throw new Error("Could not open this message.");
    const d = await r.json();
    document.getElementById("modalSubject").textContent = d.subject || "(No subject)";
    document.getElementById("modalFrom").textContent = "From: " + (d.from ? d.from.address : "");
    const body = document.getElementById("modalBody");
    if (d.html && d.html.length) body.innerHTML = d.html.join("");
    else body.textContent = d.text || "";
    document.getElementById("modalOverlay").style.display = "flex";
  } catch (e) {
    showError(e.message);
  }
}

function copyAddress() {
  const addr = currentAddress();
  const toCopy = currentFull || (addr && addr.full);
  if (!toCopy) { showError("Type a name first."); return; }
  navigator.clipboard.writeText(toCopy).then(() => {
    const btn = document.getElementById("copyBtn");
    const orig = btn.textContent;
    btn.textContent = "✓";
    setTimeout(() => { btn.textContent = orig; }, 1400);
    showInfo("Copied: " + toCopy);
  });
}

// ===== EVENT BINDINGS =====
document.getElementById("useBtn").addEventListener("click", activateAddress);
document.getElementById("copyBtn").addEventListener("click", copyAddress);
document.getElementById("randomBtn").addEventListener("click", () => {
  document.getElementById("nameInput").value = randToken(8);
  activateAddress();
});
document.getElementById("refreshBtn").addEventListener("click", () => fetchInbox(false));
document.getElementById("nameInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); activateAddress(); }
});
document.getElementById("closeModal").addEventListener("click", () => {
  document.getElementById("modalOverlay").style.display = "none";
});
document.getElementById("modalOverlay").addEventListener("click", (e) => {
  if (e.target.id === "modalOverlay") e.target.style.display = "none";
});

// ===== INIT =====
(async function init() {
  await loadDomains();
  const last = getLastAddress();
  if (last && last.includes("@")) {
    const [name, domain] = last.split("@");
    document.getElementById("nameInput").value = name;
    setDomainValue(domain);
    activateAddress();
  } else {
    document.getElementById("nameInput").value = randToken(8);
  }
})();
</script>
